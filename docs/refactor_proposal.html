  svg { display: block; }
  .node {

  }
  .node:hover { filter: brightness(1.3) drop-shadow(0 0 8px rgba(255,255,255,0.15)); }

    transition: stroke-width 0.2s;

  .node:hover rect, .node:hover circle, .node:hover polygon {

  }
  .edge { opacity: 0.4; transition: opacity 0.2s; }
  .edge:hover { opacity: 0.9; }
  .edge.highlight { opacity: 0.85; }

  #legend {
    position: fixed; bottom: 14px; left: 14px; z-index: 200;

    border-radius: 6px; padding: 10px 14px; font-size: 10px;
    line-height: 1.8;

function showView(view) {
  document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('#view-toggle button').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelectorAll('#view-toggle button').forEach(btn => {
    if (btn.textContent === view.toUpperCase()) btn.classList.add('active');
  });
  document.getElementById('stats-view').textContent = view.toUpperCase();
  document.getElementById('info-panel').style.display = 'none';
}

function showInfo(view, key) {
  const info = INFO[view]?.[key];
  if (!info) return;
  const panel = document.getElementById('info-panel');
  let html = `<h3>${info.title}</h3>`;
  if (info.tags) {
    info.tags.forEach(t => { html += `<span class="tag ${t.cls}">${t.text}</span> `; });
  }
  html += `<div class="file">${info.file || ''}</div>`;
  html += `<div class="desc">${info.desc || ''}</div>`;
  if (info.problem) html += `<hr><div class="problem">⚠ ${info.problem}</div>`;
  if (info.solution) html += `<div class="solution">✓ ${info.solution}</div>`;
  if (info.metrics) html += `<hr><div class="metric">${info.metrics}</div>`;
  panel.innerHTML = html;
  panel.style.display = 'block';
}

// Close panel on background click
document.addEventListener('click', (e) => {
  if (!e.target.closest('.node') && !e.target.closest('#info-panel')) {
    document.getElementById('info-panel').style.display = 'none';
  }
});
</script>
